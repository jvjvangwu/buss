<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="技术论坛 - 分享知识，交流经验" />
    <title>技术论坛</title>
    
    <!-- 预加载字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- PWA 配置 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#3b82f6">
    
    <!-- iOS 配置 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="技术论坛">
    
    <!-- Windows 配置 -->
    <meta name="msapplication-TileColor" content="#3b82f6">
    <meta name="msapplication-config" content="/browserconfig.xml">
    
    <!-- 社交媒体分享 -->
    <meta property="og:title" content="技术论坛">
    <meta property="og:description" content="分享知识，交流经验">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://forum.example.com">
    <meta property="og:image" content="/og-image.png">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
    
    <!-- 环境变量配置 -->
    <script>
      // 设置环境变量
      window.env = {
        VITE_API_BASE_URL: 'http://localhost:3000/api',
        VITE_APP_NAME: '技术论坛',
        VITE_APP_VERSION: '1.0.0'
      };
    </script>
    
    <!-- 加载状态 -->
    <div id="loading" style="
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s ease-out;
    ">
      <div style="text-align: center; color: white;">
        <div style="
          width: 50px;
          height: 50px;
          border: 3px solid rgba(255,255,255,0.3);
          border-radius: 50%;
          border-top-color: white;
          animation: spin 1s ease-in-out infinite;
          margin: 0 auto 20px;
        "></div>
        <h2 style="margin: 0 0 10px; font-size: 24px; font-weight: 600;">技术论坛</h2>
        <p style="margin: 0; opacity: 0.8;">加载中...</p>
      </div>
    </div>
    
    <style>
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      /* 隐藏加载动画 */
      #loading.hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
    
    <script>
      // 隐藏加载动画
      window.addEventListener('load', function() {
        const loading = document.getElementById('loading');
        setTimeout(() => {
          loading.classList.add('hidden');
          setTimeout(() => loading.remove(), 300);
        }, 500);
      });
    </script>
  </body>
</html>
